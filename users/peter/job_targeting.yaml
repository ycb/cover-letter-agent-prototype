# Job Targeting Configuration
# Defines criteria for job evaluation and filtering

target_titles:
  leadership:
    - VP of Product
    - Director of Product
    - Head of Product
    - Group Product Manager
  IC:
    - Product Manager
    - Principal Product Manager
    - Lead Product Manager
    - Senior Product Manager

comp_target: 200000  # minimum USD

locations:
  preferred:
    - San Francisco
  open_to:
    - New York
    - Colorado
    - UK
    - EU (Nordics, Spain)

role_types:
  - growth
  - founding
  - UX
  - AI/ML

company_stages:
  - startup
  - scale-up
  - public

business_models:
  - B2B
  - B2C
  - B2B2C
  - D2C

# Scoring weights for different criteria
scoring_weights:
  title_match: 5.0
  comp_target: 3.0
  location_preferred: 2.0
  location_open: 1.0
  role_type_match: 2.0
  company_stage_match: 1.5
  business_model_match: 1.0

# Minimum scores for different criteria
minimum_scores:
  title_match: 1.0
  comp_target: 0.0  # Will be evaluated separately
  location_match: 0.0
  role_type_match: 0.0

