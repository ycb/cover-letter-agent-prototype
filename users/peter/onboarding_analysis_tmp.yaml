  - title: Why should we hire you?
    situation: My top strengths are being strategic, efficient, collaborative and
      adaptable.
    action: I help teams move from undefined to actionable.  I establish clear goals
      and vision, identify dependencies and ensure cross funtional representation.   Together
      we prioritize, estimate, adapt and align on process.  Then we pursue miletones,
      making progress visible and re-calibrating as needed.
    result: ''
  - title: "Why shouldn't we hire you?\n\nassess their self-awareness, integrity,\
      \ and honesty\n\nShow pattern recognition, and draw examples from \u201Cexperience,\
      \ intuition, and common sense.\u201D Body language:  if someone crossed their\
      \ arms, for example, that \u201Cunconsciously communicates arrogance and defensiveness.\u201D"
    situation: "I am willing to push boundaries to drive things ahead.  Ex: use a\
      \ qualified team member from research instead of engaging an overburdened analyitcs\
      \ team.  Preparing the team to release a new version of a logo, in parallel\
      \ with getting all the sign offs needed.  \n\nSometimes I get too task/goal\
      \ oriented.  The goal matters, but so do perceptions, feelings, new ideas. \
      \ I"
    action: ''
    result: ''
  - title: 'What were you doing on your very best day at work?


      It was probably a day where you lost track of time because you were so engrossed
      in your work.  We want you to do that not just on your best day, but every day.'
    situation: 'Mobiquity:  got a lead from AWS for a biotech startup in San Diego
      who wanted to build a  baby tracking + genetics mobile app.'
    action: Led the team through discovery.  Put together a presentation for HLI on
      competitve landscape and the relevance of features at different stages (conception,
      pregnancy, childbirth, infancy).   Flew to San Diego with the sales team to
      give the presentation.  Led a workshop to understand the product vision and
      brainstorm features.
    result: 'Back to back contracts:  visual narrative and prototype for fundraising.  Roadmap
      and estimates for MVP.'
