  - source: star_stories
    content:
      title: 'Salesforce:  Mobile First Strategy


        Collaborative Problem Solving and Project Planning'
      situation: "Salesforce has a responsive website with informational and marketing\
        \ functions.  Mobile users are ~3.5m  per year.  Yet the mobile experience\
        \ was generally considered subpar.  \n\nThe team wanted to improve, but how\
        \ to fix and where to start were unclear. Neither the UX nor Strategy teams\
        \ had much mobile experience. They believed they could benefit from an outside\
        \ perspective."
      action: "I worked cross-functionally with the Strategy, Creative and Leadership\
        \ teams.\n\nFirst step was discovery and listening activities -- to learn\
        \ and build relationships.  I spent 2 weeks meeting people and hearing about\
        \ their ideas, goals and pain points for mobile.\n \nNext step was to work\
        \ through phases for design strategy.  WIthin 2 months I completed the following\
        \ activiites:  heuristic review, review and synthesis of analytics data, competitive\
        \ landscape analysis and a round up of relevant responsive design best practices.\
        \   I operated independently, but not in a silo -- shared early concepts (and\
        \ subsequent iterations) with stakeholders and cross functional team members\
        \ for feedback.   \n\nThen I spent 1 month on creative briefs, design explorations\
        \ and prototypes.  \n\nFinally, I spent 2 weeks boiling the work down to a\
        \ single proposal:  mobile first strategy for salesforce.com.   I presented\
        \ this proposal to the leadership team (VP and Director) -- half strategy,\
        \ half playbook -- an implementation guide with detailed footnotes."
      result: "Mobile improvements became a \u201Ctop 5\u201D initiative for FY2019.\n\
        \nCross functional alignment on vision, opportunities and tactics.  \n\nIncreasing\
        \ trend in mobile prospects was discovered, as well as new insights on mobile\
        \ user behaviors and devices\n\nMy roadmap was adopted by Strategy and Leadership.\
        \  Funding was committed to Analytics and Research activities for Q1.  UX,\
        \ content and design tracks slated for Q2-4."
    texts:
    - 'salesforce:  mobile first strategy


      collaborative problem solving and project planning'
    - "salesforce has a responsive website with informational and marketing functions.\
      \  mobile users are ~3.5m  per year.  yet the mobile experience was generally\
      \ considered subpar.  \n\nthe team wanted to improve, but how to fix and where\
      \ to start were unclear. neither the ux nor strategy teams had much mobile experience.\
      \ they believed they could benefit from an outside perspective."
