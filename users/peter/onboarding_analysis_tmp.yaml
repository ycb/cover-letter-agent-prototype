  - source: star_stories
    content:
      title: 'Salesforce:  Design Process Improvements'
      situation: 'Part of my consulting project was to assess and optimize design
        process for the UX team.  Positioned as an agency within Marketing, they had
        two modes of operating:  pitching ideas, and engaging with other Product Marketing
        teams as "clients".  Idea generation was working well, so I focused my efforts
        on bring product design best practices to digital UX for marketing.'
      action: 'I embedded within the UX team and led UX for two projects.  Changes
        included:


        Discovery - synthesis of product/marketing inputs, interviews with stakeholders
        and SME''s


        User Reserach - leverage research team for analytics and card sorts


        IA - determine regions and interactions on a page, then explore options on
        a module basis


        User Centric Design - focus on benefits, not features.  Support user flow
        and journey.


        Testing - validate concepts early'
      result: 'On time delivery


        Increased stakeholder engagement and satisfaction


        Data based and SME insights


        UX became a more strategic partner, guiding the process and work (not being
        pulled along or tasked with execution)


        New global templates and components


        Early testing validated many hypotheses and allowed us to do fine tuning before
        engaging Dev'
    texts:
