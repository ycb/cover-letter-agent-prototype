  external_star_stories:
  - title: 'Enact:  key metrics'
    situation: ''
    action: ''
    result: "Growth of Revenue: 169% YoY\n2022 Revenue:  $48k\n2023 Revenue:  $129k\n\
      \nGrowth of Users:  357% in 2023 \n1/1:  154 \n12/31:  705\n\nEngagement:  783%\
      \ average increase   \n\n\n853% increase in average monthly time per user: \
      \ 23m (Q1) --> 222m (Q4)\n876% increase in average monthly events per user:\
      \  114 (Q1) --> 1110 (Q4)\n620% increase in average monthly visitors:  3 (Q1)\
      \ --> 24 (Q4)"
  - title: 'Enact:  build PLG growth team'
    situation: Constrained growth due to a) low installer uptake, b) limited marketplace
      footprint and c) OEM ramp up
    action: "Develop ToFu:  Email, direct mail, SMS and online ads\n\nDrive conversion\
      \ via landing page experiments, email and CMS \n\nRECs:  monetize environmental\
      \ attributes for CA solar homeowners\n\nVault:  progressive onboarding"
    result: "980 visitors visited landing page \n25 converted \n= 2.55% conversion\
      \ rate\n\n\nCAC / FB ADS\n\nExperiment 1:  audience vs creative\n\n$1293 spent\
      \ to drive 862 prospects to landing page\n$1.50 per landing page view \n\nIdentitfied\
      \ top audience and creative, but 0 conversions\n\nExperiment 2:  improve landing\
      \ page to increase conversion \n\n$392 spent to drive 68 prospects to landing\
      \ page\n$5.76 per landing page view \n3 conversions= 4.41% conversion rate\n\
      Cost per lead = $131"
  - title: 'Aurora:  refocus team mandate'
    situation: "Retro:  why did we have lower throughput? \nDragged into requests\
      \ to support CS and Sales (credits, setup environments for customers and leads,\
      \ one-off requests)\nMandate to support other pods in conflict with delivery\
      \ of priorities"
    action: 'Reflect:  one-time or a pattern?

      Disucss with team:  what was their experience and how do they feel?

      Align with EM:  strategy

      Align with TechOps:  would you please?

      Align with Eng + Product VPs:  buy-in

      Communicate with GTM teams'
    result: "Increase scope for TechOps and refocus work around KPIs relative to needs\
      \ for infra and scaling\nWholly focus the team on Customer needs and Business\
      \ goals\nTransition plan for internal tools and needs of internal users \nPairing:\
      \  we fix, but show a TechOps member how\nNext time:  they fix, we support\n\
      Good documentation for hand off"
  - title: 'Aurora:  usability + beta testing'
    situation: 'Product team working in a silo

      New team members and significant time between strategy and execution

      Questions about defining scope for MVP'
    action: 'de-risk and validate:

      -prototypes

      -internal "pizza testing"

      -share current state for evaluative concept testing

      -conduct in-depth user interviews


      Work with Head of Design to develop and execute plan


      Work with Sales and CS to source participants'
    result: 'clear view across the org of design vision and input from all departments


      Bug bounty --> rewards


      New tools for collecting user feedback


      Synthesized findings to guide design and prioritization


      Built user research funciton'
  - title: 'Aurora:  platform rebuild'
    situation: '2 years platform rebuild

      evolving team and competitive landscape

      built out tablet solution for enterprise use case

      siloed product experience'
    action: "Establish priorities with leadership:  common experience between Sales\
      \ Mode and Pro Mode\nif we don't have Settings and Database this will bottleneck\
      \ migration\n\nCreate and present plan to PMs:  overview of product areas, explain\
      \ why it matters, identify phases and scope for each\n and map dependencies\n\
      \n1:1 sessions with each PM to align \n\nBreak down work  with EM and assign\
      \ to roadmap\n\nCoordinate and load balance with other pods"
    result: 'Design system

      Quarter after quarter on time delivery and team health

      Coordinated cross-pod delivery of dependencies'
  - title: 'Aurora:  phased roll out'
    situation: 'Looking top line KPI:  migrate 100% of users by EOY'
    action: 'coordinate product and GTM teams:


      -coordinate with CS and Sales-coordinate with CS and Sales

      -identify groups of customers that could be a potential match (amplitude  +
      data scientist)

      -outreach to confirm participants

      -generate cross-pod product roadmap to establish phases of readiness'
    result: "Phased rolll out \nFeature flag strategy\nImproved coordination and collaboration\
      \ with GTM\nAble to release to multiple targeted segments, gathering qual +\
      \ quant data"
  - title: 'Aurora:  Pendo'
    situation: Need to welcome and guide users to Aurora v2
    action: 'Aligh with leadership on vision

      Evaluate options:  demos with XFN working group

      Negotiate and sign contract

      Kick off with tiger team (dedicated resources)

      Create content matrix to prioritize users and flows

      All hands demo

      Work with data analyst to refine targeted customers

      Create dashboard to monitor guide engagement'
    result: "Launch on time\n100% of guides received\nUpdates to leadership and XFN\
      \ teams\nSelf service dashboards \nHand over tool to PMM and CS"
  - title: 'Salesforce:  Mobile First Strategy


      Collaborative Problem Solving and Project Planning'
    situation: "Salesforce has a responsive website with informational and marketing\
      \ functions.  Mobile users are ~3.5m  per year.  Yet the mobile experience was\
      \ generally considered subpar.  \n\nThe team wanted to improve, but how to fix\
      \ and where to start were unclear. Neither the UX nor Strategy teams had much\
      \ mobile experience. They believed they could benefit from an outside perspective."
    action: "I worked cross-functionally with the Strategy, Creative and Leadership\
      \ teams.\n\nFirst step was discovery and listening activities -- to learn and\
      \ build relationships.  I spent 2 weeks meeting people and hearing about their\
      \ ideas, goals and pain points for mobile.\n \nNext step was to work through\
      \ phases for design strategy.  WIthin 2 months I completed the following activiites:\
      \  heuristic review, review and synthesis of analytics data, competitive landscape\
      \ analysis and a round up of relevant responsive design best practices.   I\
      \ operated independently, but not in a silo -- shared early concepts (and subsequent\
      \ iterations) with stakeholders and cross functional team members for feedback.\
      \   \n\nThen I spent 1 month on creative briefs, design explorations and prototypes.\
      \  \n\nFinally, I spent 2 weeks boiling the work down to a single proposal:\
      \  mobile first strategy for salesforce.com.   I presented this proposal to\
      \ the leadership team (VP and Director) -- half strategy, half playbook -- an\
      \ implementation guide with detailed footnotes."
    result: "Mobile improvements became a \u201Ctop 5\u201D initiative for FY2019.\n\
      \nCross functional alignment on vision, opportunities and tactics.  \n\nIncreasing\
      \ trend in mobile prospects was discovered, as well as new insights on mobile\
      \ user behaviors and devices\n\nMy roadmap was adopted by Strategy and Leadership.\
      \  Funding was committed to Analytics and Research activities for Q1.  UX, content\
      \ and design tracks slated for Q2-4."
  - title: 'Salesforce:  Design Process Improvements'
    situation: 'Part of my consulting project was to assess and optimize design process
      for the UX team.  Positioned as an agency within Marketing, they had two modes
      of operating:  pitching ideas, and engaging with other Product Marketing teams
      as "clients".  Idea generation was working well, so I focused my efforts on
      bring product design best practices to digital UX for marketing.'
    action: 'I embedded within the UX team and led UX for two projects.  Changes included:


      Discovery - synthesis of product/marketing inputs, interviews with stakeholders
      and SME''s


      User Reserach - leverage research team for analytics and card sorts


      IA - determine regions and interactions on a page, then explore options on a
      module basis


      User Centric Design - focus on benefits, not features.  Support user flow and
      journey.


      Testing - validate concepts early'
    result: 'On time delivery


      Increased stakeholder engagement and satisfaction


      Data based and SME insights


      UX became a more strategic partner, guiding the process and work (not being
      pulled along or tasked with execution)


      New global templates and components


      Early testing validated many hypotheses and allowed us to do fine tuning before
      engaging Dev'
  - title: 'Samsung:  Design Process Improvements'
    situation: Team was reactive, design was tacked on at the end.  Depended on agency
      for large efforts.  Hierarchy in the org reflected in the team.  Needed a design
      leader to improve methods and process.
    action: 'Re-organize team:  end to end product designers


      Design Process:  discovery, concepts, testing, prototypes


      Collaboration - Design as a strategic partner:  work with Business, Product
      and Engineering for roadmap and sprint planning'
    result: 'Higher quality work done faster


      New tools:  InVision, Trello, User Testing.com, Principle


      Better visiblity and collaboration within the team and across the org, including
      better alignment to business objectives


      Research became a regular part of design'
  - title: 'Samsung:  Overhaul of S+'
    situation: 'App moved from marketing to support focus.  Business was considering
      a pivot to e-commerce.


      Overhaul was needed -- only direction was to make the focus "world class customer
      care"'
    action: 'Research:  understand users, analytics, competitive landscape


      Listen:  work with Business and cross funcitonal leads (PM, Eng)


      Evangalize a Vision:  support is not about problems.  Samsung has your back


      Execute:  concepts, wireframes, prototypes --> hand off to agency for visual
      design and testing'
    result: "New:  IA and menus, style guide, cards, content types, home, diagnostics,\
      \ learn, get help \n\nWithin 2 months:  200% increase in engaged users, 300%\
      \ engagement with Community, improved app rating from 3.7 to 4.2\n\nWithin 1\
      \ year:  increased user base from 12 to 20m installs and 5 to 8m monthly active\
      \ users"
  - title: 'Samsung:  Chatbot for Customer Care'
    situation: EVP wanted to develop a chatbot for customer care, to supplement text
      chat as a support channel
    action: 'Validate need:  commissioned remote moderated focus groups to understand
      customer pain points and perceptions.


      Assemble cross functional team:  PM, UX and Eng and align on vision


      Define chatbot design process, start in parallel on BE and UX


      Model chatbot and AEM content


      Style guide, compnents and identity / use cases, process flow and script


      Present proposal


      Test prototypes and synthesize --> present findings'
    result: 'Undefined to actionable in 2+ months


      Validate need, features and interactions


      Sidestep constraints around content creation


      Define choose + converse modes for MVP'
  - title: 'Etops AG:  Product Roadmap


      MVP definition, design process and rebranding'
    situation: "In 2016 I worked with a Swiss Fintech startup to jumpstart their efforts\
      \ to design and build the company\u2019s first cloud based SaaS product. Founded\
      \ in 2010, Etops has ~50 employees in three countries. The founders had a product\
      \ vision and deep understanding of their industry, but little experience with\
      \ UX or product design."
    action: "Product roadmap:\u200B create the first detailed description of total\
      \ features and functions\n\nMVP definition\u200B: prioritize according to business\
      \ and user needs to define the initial release \n\nBranding\u200B: new name,\
      \ brand identity and logo.  Revise company mission and values\n\nAs the Head\
      \ of Design, I worked alongside the founders as part of their executive team.\
      \  I met with clients and partners.  I led branding workshops to establish priorities\
      \ and brand strategy, then selected and managed an agency for creative services.\
      \  I worked with cross functional team members in the US, Switzerland and Slovakia,\
      \ including Engineering, Operations, Product and Legal."
    result: 'On time delivery:  all milestones were met and deliverables completed
      on time


      Undefined to actionable:  the combined deliverables constituted a considered,
      achievable and actionable plan.  These included:  user survey, creative brief,
      personas, MVP definition, design/dev estimates and roadmap.


      Utilization of best practices:  the proposals reflected and contained design
      best practices, as applicable to the company size, stage, location and industry.  These
      included:  user centric approach, iterative design process, dependency tracking
      and ROM estimates.'
  - title: 'Mobiquity:  Creative Team Project Management


      Tracking creative deliverables'
    situation: "During my time at Mobiquity I worked as a Project Manager and UX Architect.\
      \  Our small team used an informal system of verbal check-ins to understand\
      \ the status of features. But we had no \u201Cbig picture\u201D view, and ran\
      \ the risk of missing something that had been requested or promised as we rushed\
      \ to deliver, refine and evolve."
    action: 'I created a spreadsheet to track cretaive deliverables to address this
      problem.


      status: which items are done vs in-flight?

      sprint planning with filters for each IC

      phases: where are we in the design process?

      integrations: include links to design assets'
    result: This tool helped us connect planning to execution, communicate status
      to clients, track revisions and change orders and ensure timely delivery on
      our contractual and verbal agreements.
