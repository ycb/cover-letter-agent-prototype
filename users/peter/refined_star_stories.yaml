        RECs: monetize environmental attributes for CA solar homeowners


        Vault: progressive onboarding'
      result: '980 visitors visited landing page

        25 converted

        = 2.55% conversion rate


        CAC / FB ADS


        Experiment 1: audience vs creative


        $1293 spent to drive 862 prospects to landing page

        $1.50 per landing page view


        Identitfied top audience and creative, but 0 conversions


        Experiment 2: improve landing page to increase conversion


        $392 spent to drive 68 prospects to landing page

        $5.76 per landing page view

        3 conversions= 4.41% conversion rate

        Cost per lead = $131'
