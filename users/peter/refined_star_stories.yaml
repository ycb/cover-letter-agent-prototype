- original_story:
    id: salesforce_mobile_strategy
    title: 'Salesforce: Mobile First Strategy'
    original_content:
      situation: 'Salesforce has a responsive website with informational and marketing
        functions. Mobile users are ~3.5m per year. Yet the mobile experience was
        generally considered subpar.


        The team wanted to improve, but how to fix and where to start were unclear.
        Neither the UX nor Strategy teams had much mobile experience. They believed
        they could benefit from an outside perspective.'
      action: 'I worked cross-functionally with the Strategy, Creative and Leadership
        teams.


        First step was discovery and listening activities -- to learn and build relationships.
        I spent 2 weeks meeting people and hearing about their ideas, goals and pain
        points for mobile.


        Next step was to work through phases for design strategy. Within 2 months
        I completed the following activities: heuristic review, review and synthesis
        of analytics data, competitive landscape analysis and a round up of relevant
        responsive design best practices. I operated independently, but not in a silo
        -- shared early concepts (and subsequent iterations) with stakeholders and
        cross functional team members for feedback.


        Then I spent 1 month on creative briefs, design explorations and prototypes.


        Finally, I spent 2 weeks boiling the work down to a single proposal: mobile
        first strategy for salesforce.com. I presented this proposal to the leadership
        team (VP and Director) -- half strategy, half playbook -- an implementation
        guide with detailed footnotes.'
      result: 'Mobile improvements became a ''top 5'' initiative for FY2019.


        Cross functional alignment on vision, opportunities and tactics.


        Increasing trend in mobile prospects was discovered, as well as new insights
        on mobile user behaviors and devices


        My roadmap was adopted by Strategy and Leadership. Funding was committed to
        Analytics and Research activities for Q1. UX, content and design tracks slated
        for Q2-4.'
    importance_score: 9
    source: star_stories
    status: refined
    user_voice_notes: null
    llm_refined_version: At Salesforce, I led a cross-functional team to revamp our
      mobile strategy, addressing the subpar experience for our 3.5 million annual
      mobile users. Through comprehensive discovery, design, and prototyping phases
      over five months, I developed and secured leadership approval for a mobile-first
      strategy. This initiative was prioritized as a top five project for FY2019,
      aligning cross-functional teams and securing funding for further analytics and
      UX enhancements, leading to increased mobile engagement and valuable user insights.
