- situation: Platform rebuild, extended timeline. Rapid growth, lack of context and
    institutional knowledge. Many ideas from bright and passionate people.
  task: Revise product planning and roadmap
  action: Ask people to trust and be patient. Work within the product team only. Overhaul
    to increase transparency and collaboration.
  result: 'Increased stakeholder engagement. More collaboration with GTM. Created
    new functions: Solutions Architect, PMM.'
- situation: 'CP requests battery control feature. 3 prong growth strategy: New sales
    (direct), New sales (channel partners), Existing systems.'
  task: Decline channel partner feature request
  action: 'Gather data: explore API: data is available. Mock up solution: TOU 7 days
    per week charge/discharge. Identify risks: too complex / users don''t have backup
    power when needed / revised savings forecast. Get input: talk to CEO, CTO, PM
    and EM. Present findings.'
  result: 'Low effort fix: contact channel partner to adjust settings. Longer term
    fix: work with OEM partners to incorporate smart settings.'
- situation: 'Monetization and growth: free money. Too complex / ambiguous.'
  task: RECs pilot
  action: 'Evaluate opportunity: financial model (TAM > SOM). Resi and commercial
    systems in CA. Work with CEO, advisors and investors. Establish end-to-end functionality.
    Work with PM, PMM and CS. Broker: takes commission, avoids 6 month registration,
    pays all fees, pays immediately (finds buyers). Legal: contract for transfer of
    ownership. Eligibility: owned (not leased) with supported RGM inverter. Surprise:
    RGM is a capability. Manual → automated. Enrollment: document collection, status
    tracking and roll-up metrics. PMM: landing page, FAQ, email and assets – gain
    new customers. CS: campaigns to existing customers.'
  result: 'EOY 2023: Achieved OKR to onboard first DGG resi systems ($10k) +10 commercial
    systems ($40k) for 5 year sign-up. Next step: scale up → 5X target for 2024.'
- situation: We were halfway through a platform rebuild and had recently scaled up
    the team to accelerate delivery. New Design Manager wanted to plan a 3 week design
    sprint to come up with new ideas. I said it wasn't needed and wouldn't be the
    best use of time, given existing strategy and roadmap. A week later, my manager
    mentioned the person felt shut down and thought I was unwilling to collaborate.
  task: Answered when I needed to listen
  action: 'I asked if we could brainstorm alternatives. We came up wth a few: 1) include
    in future quarterly planning 2) use a hackathon approach to take this on over
    a weekend or in the evening 3) to have a series of smaller design sprints planned
    that could accomlish the same goals over time. We settled on option 3. I took
    time to talk it through with manager and to personally reflect on the situation.
    I realized how this looked and felt to the other person like unwillingness to
    collaborate. I took them out for coffee and apoligized for being abrupt. I asked
    about the activities and outcomes they had in mind. I learned that a multi-week
    design sprint was intended to help with team-building and serve as a holistic
    design exercise to align the pods. I showed enthusiasm for the idea. And shared
    my concern that, In the short-term, it would impact delivery to lose design support
    in upcoming sprints.'
  result: We found a mutual compromise and over time, refreshed our "north star" vision
    for UX, which became an important tool for managing design debt and identifying
    new opportunities. I learned how important it is to match people in conversation.
    Sharing in the excitement instead of shutting it down was key. I had to address
    my own feelings -- the desire to make progress towards commitments. So I could
    understand and empathize with a new team member -- and strengthen a new relationship
    via co-creation. Northstar created opportunity for $1m sales of tablet based sales
    solution. Worked together on next project for usability testing and user interviews
    with ENT orgs.
