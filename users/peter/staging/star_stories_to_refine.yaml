- situation: Snuck in a 'last minute' feature and delayed a release
  task: SVP was working with an agency to create a new logo for Samsung Customer Care.
    Single brand experience for all devices (from electronics to appliances) in physical
    and digital mediums. Had a personal relationship with SVP. He liked that we operated
    as a startup within the enterprise, and that we had 20m users. Roll-out was scheduled
    to take time. SVP asked if I could include updated logo in the upcoming release.
  action: I said we could take this on. I asked design and front end to drop what
    they were doing to make this small change. They had to hustle to prepare different
    sizes based for supported screen resoutions. Then I asked QA to quickly review.
    We got this done in a single day. But, the release process involved cross-functional
    review. The marketing team saw the new logo and pointed out that we'd have a fragmented
    brand experience. Marketing materials would need to be updated. And then S+ would
    be out of sync with other products. They had other work in progress (commercials,
    conferences) and couldn't hustle to support this change. Escalated to VP of Marketing,
    who vetoed.
  result: 'Release delayed by 1 day. Impacted team: Engineers had to roll back the
    changes and create a new build. I learned the important of release-readiness and
    coordination with GTM teams. Image update is a small change, but part of a larger
    effort. To be mindful of commiting to personal favors that require more than my
    efforts to deliver. And to be cautious about introducing last-minute changes that
    tax the team.'
