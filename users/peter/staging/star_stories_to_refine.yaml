- situation: Built a product that addressed unmet consumer needs and showed high levels
    of engagement. Initial user base small. Acquired via direct sales -- software
    bundled with hardware at time of purchase. 3m existing solar homeowners / SOM
    of 200k (last 3-5 years, CA only). Could we acquire customers by marketing directly
    to existing solar homeowners?
  task: Acquisition efforts unsuccessful
  action: "1) Stick to direct sales / new installs. People-intensive with limited\
    \ ability to scale. 5 salespeople closing 5-10 deals a month = 300 per year. Need\
    \ a solution that can add thousands of users\n\n2) Leverage B2B2C partnerships:\
    \ had 2 contracts with battery manufacturers. Growth was slow and constrained:\
    \ small players would sell 2-5k systems per year. Value props mis-aligned. End\
    \ users loved hardware-agnostic savings and monetization. Manufacturers wanted\
    \ controls for their ecosystem of products. \n \n3) Direct to consumer / existing\
    \ installs: largest opportunity -- but difficult to reach, educate and displace"
  result: ''
