# Data Model - Sources of Truth and Staging Areas
# All Drive, LLM, and mined content is first staged in users/{user}/staging/ until user approval.
# Only approved/curated content is moved to the main files (work_history.yaml, blurbs.yaml, etc.)
data_model:
  # Sources of Truth (Approved Content)
  sources_of_truth:
    - "blurbs.yaml"           # Approved work samples and content
    - "resume_contents.yaml"  # Parsed resume data
    - "config.yaml"           # User profile and preferences
  
  # Staging Areas (External/Drive Content)
  staging_areas:
    - "work_samples.yaml"     # Work samples pending approval
    - "private_artifacts.yaml" # Raw artifacts to be mined for stories
    - "google_drive"          # All Drive content (cover letters, STAR stories, etc.)
    - "external_profiles"     # LinkedIn, GitHub, etc.
    - "job_tracker"           # Job application data
  
  # Net-New Detection
  net_new_detection:
    enabled: true
    sources_to_check:
      - "cover_letters"
      - "star_stories" 
      - "job_tracker"
      - "portfolio_work"
      - "presentations"
      - "external_profiles"
    ranking_enabled: true
    auto_approval: false  # Manual approval required

google_drive:
  credentials_file: credentials.json
  enabled: true
  materials:
    cover_letters: 0B9PEBLmrpxxiX29qaHlUb3RLME0
    portfolio_work: 0B9PEBLmrpxxibkNlaTZmSVB6MUE
    presentations: 1cNjWcSc7c2a9OVpGTFblQ7XXZdwnQxUG
    job_tracker: 1QoCzbriR9hyRyIldOZ8TpK03SB-j7xu3UKuAu-iZ5qc
    star_stories: 16zJzR_XVZtdtuQfacZXRZm9yHHyKNWkp6YTeueI085E
  # Flexible file discovery configuration
  file_discovery:
    # Auto-discover files by name patterns
    star_stories_patterns:
      - "resume grid"
      - "star stories"
      - "behavioral examples"
      - "situation action result"
      - "STAR"
    job_tracker_patterns:
      - "job tracker"
      - "applications"
      - "2025"
    cover_letter_patterns:
      - "cover letter"
      - "application"
      - "resume"
    # Fallback folders for discovery
    fallback_folders:
      star_stories: "0B9PEBLmrpxxiQTFycllWTDVOUVk"
      job_tracker: "1QoCzbriR9hyRyIldOZ8TpK03SB-j7xu3UKuAu-iZ5qc"
  # Spreadsheet parsing configuration
  spreadsheet_parsing:
    star_stories:
      column_layouts:
        - ["title", "situation", "action", "result"]
        - ["company", "situation", "action", "result"]
        - ["role", "situation", "action", "result"]
      title_patterns:
        - "company"
        - "role"
        - "project"
        - "situation"
    # Tabs containing STAR stories
    tabs:
      - "Stories"
      - "2024 Stories (Behavioral)"

# PM Level and Role Inference
pm_inference:
  enabled: true
  confidence_threshold: 0.7
  levels:
    - "Junior PM"
    - "Senior PM" 
    - "Principal PM"
    - "Director of Product"
    - "VP of Product"
    - "CPO"
  skills_to_assess:
    - "Product Strategy"
    - "User Research"
    - "Data Analytics"
    - "Cross-functional Leadership"
    - "Technical Depth"
    - "Business Acumen"

# Cover Letter Generation
cover_letter_generation:
  enabled: true
  max_length: 400
  tone: "professional"
  include_specific_examples: true
  use_star_format: true
  target_companies: []
  custom_prompts: {}

# External Profile Integration
external_profiles:
  linkedin:
    enabled: true
    url: "https://www.linkedin.com/in/pspan"
  github:
    enabled: false
    username: ""
  portfolio:
    enabled: true
    url: ""
