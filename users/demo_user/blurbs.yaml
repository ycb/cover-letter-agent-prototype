intro:
- id: standard
  tags:
  - all
  text: "I'm a product leader with 15+ years of experience building user-centric products that deliver business results. My background includes leading 0–1 at hypergrowth startups and driving impact at scale for global brands. I began my career as a front-end engineer, transitioned through UX leadership, and moved into product management 8 years ago to lead full-lifecycle execution. My approach emphasizes customer empathy, human-centered design, and data-driven decision-making."

paragraph2:
- id: growth
  tags:
  - growth
  text: "I build growth systems that align cross-functional teams around measurable outcomes. I uncover product gaps through behavioral analytics, user interviews, and collaboration with customer success, sales and product marketing. I lead a hypothesis-driven development process that includes iteration and beta testing. I develop roadmaps grounded in differentiated value and lead delivery with a focus on activation, engagement, and sustained retention."

examples:
  - id: enact
    tags: [growth, leadership, founding_pm, cleantech, b2b2c, startup, gtm, xfn, 0_to_1, strategy, data_driven]
    text: "At Enact Systems, I led a cross-functional team from 0–1 to improve home energy management. As part of the Series A management team, I owned P&L for the consumer line of business and defined product strategy based on customer insights and financial modeling. I built a unified roadmap for 2 pods and 3 products (web, mobile, and white-label), hired and coached the team, and drove consistent quarterly execution. These efforts delivered +210% MAUs, +876% event growth, +853% time-in-app, and +169% revenue growth."

  - id: aurora
    tags: [platform, founding_pm, growth, cleantech, design_tools, b2b, b2b2c, scaleup, xfn, onboarding, internal_tools, plg, data_driven, usability]
    text: "At Aurora Solar, I was a founding PM and helped scale the company from Series A to Series C. I led a platform rebuild that transformed a solar design tool into a full sales engine—broadening adoption from designers to sales teams and supporting a shift from SMB to enterprise. I introduced beta testing, behavioral analytics, and PLG onboarding to accelerate launches. I also aligned marketing, support, and engineering through shared prioritization, integrated support workflows, and the v1 design system. These efforts helped Aurora reach 90% adoption among top U.S. EPCs and achieve a $4B valuation."

  - id: meta
    tags: [ai_ml, ux, platform, analytics, internal_tools, public, xfn, trust, explainability, data_driven, usability]
    text: "At Meta, I led a cross-functional ML team to scale global recruiting tools. High-precision candidate recommendations had low adoption, so I conducted discovery to identify trust and UX barriers. I introduced explainable AI and a co-pilot UX to improve transparency and control, and rolled out these changes in phases. The result: a 130% increase in claims within 30 days and a 10x lift in ML usage by year's end."

  - id: samsung
    tags: [growth, ux, b2c, public, onboarding, usability, mobile, support, engagement, product_quality, consumer]
    text: "At Samsung, I led the overhaul of the Samsung+ app to restore trust after the Note7 crisis. I introduced new support features (video chat, remote host, SMS, warranty program) and designed personalized content (Skills and Tips) to reduce returns. I led customer discovery and usability testing and aligned cross-functional teams in marketing, e-commerce, and content strategy. These efforts drove a 160% increase in MAUs, 200% higher engagement, and improved our Play Store rating from 3.7 to 4.3."

leadership:
- id: leadership
  tags:
  - leadership
  - management
  text: "I have 6+ years of experience leading and mentoring high-performing product teams. I build systems that increase collaboration, accountability, and alignment to company goals. My leadership philosophy centers on empathy, candor, and psychological safety. I attract and develop diverse talent and foster cultures of mutual respect and consistent, purpose-driven execution."

closing:
- id: standard
  tags:
  - all
  text: "I'd be excited to bring my experience in product strategy and execution to your team. Let's connect on how I can contribute to your next chapter."
