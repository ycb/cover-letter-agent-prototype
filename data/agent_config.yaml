# Cover Letter Customization
cover_letter:
  # Personal branding elements
  personal_brand:
    tagline: "Product leader focused on clarifying ambiguity and building trust"
    key_strengths:
      - "Building systems that align teams around measurable outcomes"
      - "Clarifying ambiguity in complex environments"
      - "Creating trust in AI and ML systems"
      - "Scaling products from zero to millions of users"
    
  # Tone preferences
  tone:
    default: "professional"  # professional, conversational, startup, enterprise
    startup: "conversational"
    enterprise: "professional"
    AI_ML: "technical"
  
  # Custom placeholders for dynamic content
  placeholders:
    company_name: "[Company Name]"
    position_title: "[Position Title]"
    specific_achievement: "[Specific Achievement]"
    case_study_reference: "[Case Study Reference]"

# Integration Settings
integrations:
  # Google Drive API setup instructions
  google_drive_setup:
    steps:
      - "1. Go to Google Cloud Console"
      - "2. Create a new project or select existing"
      - "3. Enable Google Drive API"
      - "4. Create service account credentials"
      - "5. Download credentials.json to project root"
      - "6. Share your Google Drive folder with the service account email"
  
  # File type support
  supported_file_types:
    - "pdf"
    - "docx"
    - "pptx"
    - "xlsx"
    - "txt"
    - "md"

# Output Settings
output:
  # Cover letter formatting
  format:
    include_header: true
    include_footer: true
    max_length: 400  # words
    preferred_sections: ["intro", "experience", "examples", "closing"]
  
  # File naming convention
  file_naming:
    pattern: "{company}_{position}_{date}"
    date_format: "%Y%m%d"
  
  # Export options
  export_formats:
    - "txt"
    - "md"
    - "docx"  # Requires python-docx package 