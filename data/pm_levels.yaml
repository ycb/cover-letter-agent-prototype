# PM Levels Competencies Mapping
# Defines key competencies and skills for different Product Manager levels
# Used to add level-appropriate scoring bonuses to case study selection

pm_levels:
  L2:  # Associate Product Manager / Junior PM
    name: "Associate Product Manager"
    years_experience: "0-2 years"
    key_competencies:
      - "product_execution"
      - "user_research"
      - "data_analysis"
      - "feature_development"
      - "stakeholder_communication"
      - "agile_methodologies"
      - "user_experience"
      - "market_research"
      - "competitive_analysis"
      - "product_launch"
    
