# Scoring multipliers for different levels
# Higher levels get more bonus points for level-appropriate competencies
level_scoring_multipliers:
  L2: 1.0
  L3: 1.2
  L4: 1.5
  L5: 2.0
  L6: 2.5

# Default level if not specified
default_level: "L4" 