name: Validate Blurbs

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'users/**/blurbs.yaml'
      - 'config/blurb_schema.json'
      - 'core/schema_validator.py'
      - 'scripts/validate_blurbs.py'
  pull_request:
    branches: [ main ]
    paths:
      - 'users/**/blurbs.yaml'
      - 'config/blurb_schema.json'
      - 'core/schema_validator.py'
      - 'scripts/validate_blurbs.py'

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Validate all user blurbs
      run: |
        python scripts/validate_blurbs.py --all --verbose --exit-code
        
    - name: Run schema validation tests
      run: |
        python -m pytest tests/test_schema_validation.py -v
        
    - name: Upload validation results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: validation-results
        path: |
          validation-results.json
        retention-days: 7 